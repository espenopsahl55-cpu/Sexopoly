/* ===== BUTTON LAYOUT ===== */

#bottomButtons{
  display: flex;
  flex-direction: column;
  gap: 14px;
}

#secondaryButtons{
  display: flex;
  gap: 12px;

#secondaryButtons button{
  flex:1;

#dice{
  display:flex;
  gap:24px;
  font-size:52px;
  justify-content:center;

  filter:
    drop-shadow(0 0 10px rgba(255,255,255,0.25))
    drop-shadow(0 0 20px rgba(255,255,255,0.12));
}
#dice{
  position: relative;
}

#dice::after{
  content: "";
  position: absolute;
  inset: -10px;
  border-radius: 18px;
  pointer-events: none;
  opacity: 0;
}

#dice.impactFlash::after{
  animation: diceFlash .22s ease;
}

@keyframes diceFlash{
  0%{
    opacity: 0;
    box-shadow: 0 0 0 rgba(255,255,255,0);
  }
  45%{
    opacity: 1;
    box-shadow:
      0 0 18px rgba(255,255,255,0.22),
      0 0 34px rgba(255,255,255,0.12);
  }
  100%{
    opacity: 0;
    box-shadow: 0 0 0 rgba(255,255,255,0);
  }
}
#dice div{
  transition: transform .12s ease, filter .12s ease;
  will-change: transform, filter;
}

#dice.rolling #d1{
  animation: diceShakeLeft .16s linear infinite;
}

#dice.rolling #d2{
  animation: diceShakeRight .16s linear infinite;
}

#dice div.diceImpact{
  animation: diceImpactPop .22s ease;
}

@keyframes diceImpactPop{
  0%{
    transform: scale(1) translateY(0);
    filter:
      drop-shadow(0 0 10px rgba(255,255,255,0.20))
      drop-shadow(0 0 20px rgba(255,255,255,0.10));
  }
  45%{
    transform: scale(1.24) translateY(-2px);
    filter:
      drop-shadow(0 0 18px rgba(255,255,255,0.45))
      drop-shadow(0 0 34px rgba(255,255,255,0.22));
  }
  100%{
    transform: scale(1.08) translateY(1px);
    filter:
      drop-shadow(0 0 12px rgba(255,255,255,0.28))
      drop-shadow(0 0 24px rgba(255,255,255,0.14));
  }
}

@keyframes diceShakeLeft{
  0%   { transform: translateX(0) rotate(0deg); }
  25%  { transform: translateX(-2px) rotate(-6deg); }
  50%  { transform: translateY(1px) rotate(4deg); }
  75%  { transform: translateX(2px) rotate(-4deg); }
  100% { transform: translateX(0) rotate(0deg); }
}

@keyframes diceShakeRight{
  0%   { transform: translateX(0) rotate(0deg); }
  25%  { transform: translateX(2px) rotate(6deg); }
  50%  { transform: translateY(-1px) rotate(-4deg); }
  75%  { transform: translateX(-2px) rotate(4deg); }
  100% { transform: translateX(0) rotate(0deg); }
}

      return;

    const nextSpeed = speed + 10;

function move(steps) {
  const p = players[current];
  let moved = 0;

  const stepAnim = setInterval(() => {
    const oldPos = p.pos;
    p.pos = (p.pos + 1) % tiles.length;

    if (oldPos === tiles.length - 1 && p.pos === 0) {
      p.laps++;

        clearInterval(stepAnim);
        updateTurnIndicator();
        return;
      }
    }

    place(p);

    moved++;
    if (moved >= steps) {
      clearInterval(stepAnim);
      resolve(tiles[p.pos]);
    }
  }, 300);
}

}

    "jazz4.mp3",
    "jazz5.mp3",
    "jazz6.mp3",
    "jazz7.mp3",
    "jazz8.mp3"
  ];

  const music = document.getElementById("bgMusic");
  let currentTrack = 0;

  // 🔀 Shuffle playlist
  function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [array[i], array[j]] = [array[j], array[i]];
    }
  }

  shuffle(playlist);

  function playTrack(i){
    currentTrack = i;
    music.src = playlist[currentTrack];
    music.volume = 0.3;
    music.play().catch(()=>{});
  }

  // ▶️ Når sang er ferdig → neste
  music.addEventListener("ended", () => {
    currentTrack = (currentTrack + 1) % playlist.length;
    playTrack(currentTrack);
  });

  // ▶️ Start ved første trykk (mobil-policy)
document.body.addEventListener("click", function startMusic(){
  requestWakeLock();      // 🔥 holder skjermen våken
  playTrack(0);
  document.body.removeEventListener("click", startMusic);
});
  
</script>
</body>
</html>
