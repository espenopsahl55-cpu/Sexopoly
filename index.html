<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Sex o Pol – Meny</title>

<style>
  :root{
    --preview-h: 140px;
    --card-w: 520px;
    --accent: #4da6ff;
  }

  html, body{
    margin:0; padding:0;
    width:100vw; height:100dvh;
    background:#000; color:#fff;
    font-family:Arial, sans-serif;
    overflow:hidden;
    -webkit-tap-highlight-color: transparent;
  }

  /* ========= LIVE BACKGROUND (safe, alltid bak) ========= */
  #bg{
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;

    background:
      radial-gradient(circle at 20% 30%, rgba(255,0,150,0.22), transparent 45%),
      radial-gradient(circle at 80% 70%, rgba(77,166,255,0.22), transparent 45%),
      radial-gradient(circle at 60% 20%, rgba(255,200,0,0.16), transparent 55%),
      #000;

    filter: blur(34px);
    animation: bgFloat 18s ease-in-out infinite alternate;
  }

  #bg::after{
    content:"";
    position:absolute;
    inset:0;

    background:
      radial-gradient(circle at 50% 40%, transparent 0%, rgba(0,0,0,0.55) 55%, rgba(0,0,0,0.88) 100%),
      repeating-linear-gradient(
        0deg,
        rgba(255,255,255,0.035) 0px,
        rgba(255,255,255,0.035) 1px,
        transparent 2px,
        transparent 4px
      );

    opacity: .55;
    mix-blend-mode: overlay;
    pointer-events:none;
  }

  @keyframes bgFloat{
    0%{ transform: scale(1) translateY(0px); }
    100%{ transform: scale(1.08) translateY(-20px); }
  }

  /* ========= ROTER-OVERLAY (skal være ALLTID øverst) ========= */
  #rotateWarning{
    position: fixed;
    inset: 0;
    background: #000;
    color: #fff;
    display: none;              /* styres av JS */
    justify-content: center;
    align-items: center;
    font-size: 22px;
    z-index: 3000;              /* høyest */
    text-align: center;
    padding: 24px;
  }

  /* ========= START-OVERLAY (LOADING) ========= */
  #launchOverlay{
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.72);
    backdrop-filter: blur(8px);
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    gap: 14px;
    z-index: 2500;              /* under rotateWarning, over alt annet */
    text-align: center;
  }
  #launchOverlay.show{ display:flex; }
  #launchOverlay .title{ font-size: 28px; font-weight: bold; }
  #launchOverlay .dice{ font-size: 46px; animation: spinDice 1s linear infinite; }
  @keyframes spinDice{ from{transform:rotate(0deg);} to{transform:rotate(360deg);} }

  /* Når vi starter spillet: skjul menyen så du ikke ser den bak overlay */
  body.starting #wrap{
    visibility: hidden;         /* skjuler innhold, men beholder layout */
  }
  body.starting #splash{
    display:none !important;
  }

  /* ========= SPLASH ========= */
  #splash{
    position: fixed;
    inset: 0;
    background: transparent;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    gap:14px;
    padding:24px;
    z-index: 1200;
  }

  #splash h1{ margin:0; font-size:36px; letter-spacing:0.5px; }
  #splash .byline{ opacity:.75; font-size:16px; }
  #splash .tap{ margin-top:14px; font-size:14px; opacity:.7; }

  @keyframes pulse {
    0%, 100% { opacity: .55; transform: translateY(0); }
    50% { opacity: .9; transform: translateY(-2px); }
  }
  #splash .tap{ animation: pulse 1.2s infinite; }

  #splashMascot{
    width: min(32vw, 170px);
    height: auto;
    margin-bottom: 8px;
    user-select: none;
    -webkit-user-drag: none;
    opacity: 0.95;
    filter: drop-shadow(0 0 12px rgba(77,166,255,0.35));
    border-radius: 12px;
  }

  /* ========= MENY ========= */
  #wrap{
    height:100dvh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:12px;
    padding:18px;
    box-sizing:border-box;
    position: relative;
    z-index: 1100;
  }

  h2{ margin:0; font-size:26px; text-align:center; }

  #previewCard{
    width: min(80vw, var(--card-w));
    border-radius:16px;
    padding:12px;
    box-sizing:border-box;

    background: rgba(18,18,18,0.55);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.10);
    box-shadow: 0 18px 55px rgba(0,0,0,0.55);
  }

  #previewFrame{
    width:100%;
    height: var(--preview-h);
    border-radius:12px;
    overflow:hidden;
    background:#000;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  #previewImg{
    width:100%;
    height:100%;
    object-fit: contain;
    display:block;
    user-select:none;
    -webkit-user-drag:none;
    touch-action: pan-y;
  }

  #boardLabel{ margin-top:10px; font-size:15px; opacity:.85; text-align:center; }
  #hint{ font-size:12px; opacity:.6; text-align:center; }

  #dots{
    display:flex;
    gap:8px;
    justify-content:center;
    margin-top:10px;
  }
  .dot{ width:8px; height:8px; border-radius:50%; background:#555; }
  .dot.active{ background: var(--accent); }

  .actions{ display:flex; gap:12px; align-items:center; justify-content:center; }

  button{
    padding:14px 22px;
    font-size:18px;
    border-radius:12px;
    border:none;
    font-weight:bold;
    cursor:pointer;
    min-height:54px;
  }
  #startBtn{ background: var(--accent); color:#fff; }
  #startBtn:active{ transform:scale(.97); }

  .navBtn{
    background:#222;
    color:#fff;
    padding:14px 16px;
    min-width:54px;
  }
  .navBtn:active{ transform:scale(.97); }

  @media (max-width: 420px){
    :root{ --preview-h: 120px; }
    #splash h1{ font-size:32px; }
    h2{ font-size:24px; }
  }
</style>
</head>

<body>

<div id="bg"></div>

<div id="rotateWarning">
  🔄 Snu telefonen til liggende for å spille
</div>

<div id="launchOverlay">
  <div class="title">Starter spillet…</div>
  <div class="dice">🎲</div>
</div>

<div id="splash" onclick="enterMenu()" role="button" aria-label="Trykk for å fortsette">
  <img id="splashMascot" src="mascot.png" alt="Sexopoly mascot">
  <h1>Welcome to Sexopol</h1>
  <div class="byline">Made by Espen Opsahl</div>
  <div class="tap">Trykk for å fortsette</div>
</div>

<div id="wrap">
  <h2>Velg spillebrett</h2>

  <div id="previewCard">
    <div id="previewFrame">
      <img id="previewImg" src="board.png" alt="Preview">
    </div>

    <div id="boardLabel"></div>
    <div id="hint">Sveip på bildet for å bytte brett</div>
    <div id="dots"></div>
  </div>

  <div class="actions">
    <button class="navBtn" onclick="prevBoard()">◀</button>
    <button id="startBtn" onclick="startGame()">Start spill</button>
    <button class="navBtn" onclick="nextBoard()">▶</button>
  </div>
</div>

<script>
  // Holder styr på om bruker har "gått inn" i menyen
  let entered = false;

  function setPortraitMode(isPortrait){
    const warning = document.getElementById("rotateWarning");
    const splash = document.getElementById("splash");
    const wrap = document.getElementById("wrap");
    const overlay = document.getElementById("launchOverlay");

    if (isPortrait){
      // ✅ Kun rotateWarning skal vises i portrett
      warning.style.display = "flex";
      splash.style.display = "none";
      wrap.style.display = "none";
      overlay.classList.remove("show");
      document.body.classList.remove("starting");
    } else {
      warning.style.display = "none";

      // ✅ I landscape: vis splash hvis ikke "entered", ellers vis meny
      if (!entered){
        splash.style.display = "flex";
        wrap.style.display = "flex";
      } else {
        splash.style.display = "none";
        wrap.style.display = "flex";
      }
    }
  }

  function checkOrientationMenu(){
    const isPortrait = window.matchMedia("(orientation: portrait)").matches;
    setPortraitMode(isPortrait);
  }

  window.addEventListener("resize", checkOrientationMenu);
  checkOrientationMenu();

  function enterMenu(){
    const isPortrait = window.matchMedia("(orientation: portrait)").matches;
    if (isPortrait) return;
    entered = true;
    document.getElementById("splash").style.display = "none";
    document.getElementById("wrap").style.display = "flex";
  }

  const boards = [
    {name:"Original", file:"board.png",  theme:"gul"},
    {name:"Grønn/Lilla/Blå", file:"board2.png", theme:"lysegronn"},
    {name:"Lilla/Grønn/Gul", file:"board3.png", theme:"lilla"},
    {name:"Lilla/Gul", file:"board4.png", theme:"gul"},
    {name:"Blå/Gul", file:"board5.png", theme:"gul"},
    {name:"Lyseblå/Gul", file:"board6.png", theme:"lysebla"},
    {name:"Grønn/Gul", file:"board7.png", theme:"gronn"}
  ];

  let index = 0;

  const img = document.getElementById("previewImg");
  const label = document.getElementById("boardLabel");
  const dotsWrap = document.getElementById("dots");

  boards.forEach(() => {
    const d = document.createElement("div");
    d.className = "dot";
    dotsWrap.appendChild(d);
  });

  function updateUI(){
    img.src = boards[index].file;
    label.textContent = boards[index].name;

    document.querySelectorAll(".dot").forEach((d,i)=>{
      d.classList.toggle("active", i === index);
    });
  }

  function nextBoard(){
    index = (index + 1) % boards.length;
    updateUI();
  }
  function prevBoard(){
    index = (index - 1 + boards.length) % boards.length;
    updateUI();
  }

  let startX = 0;
  img.addEventListener("touchstart", e=>{
    startX = e.changedTouches[0].screenX;
  }, {passive:true});

  img.addEventListener("touchend", e=>{
    const diff = e.changedTouches[0].screenX - startX;
    if (diff < -50) nextBoard();
    else if (diff > 50) prevBoard();
  }, {passive:true});

  async function startGame(){
    // Hvis portrait: ikke start (bruker skal rotere)
    const isPortrait = window.matchMedia("(orientation: portrait)").matches;
    if (isPortrait) return;

    // ✅ Skjul menyen (så du ikke ser den bak), vis loading
    document.body.classList.add("starting");
    const overlay = document.getElementById("launchOverlay");
    overlay.classList.add("show");

    try{
      if (screen.orientation && screen.orientation.lock){
        await screen.orientation.lock("landscape");
      }
    }catch(e){}

    const chosen = boards[index].file;
    const theme = boards[index].theme;

    setTimeout(()=>{
      window.location.href =
        "game.html?board=" + encodeURIComponent(chosen) +
        "&theme=" + encodeURIComponent(theme);
    }, 420);
  }

  img.onerror = () => { img.src = "board.png"; };

  updateUI();
</script>

</body>
</html>
