<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Sex o Pol – Meny</title>

<style>
  :root{
    --preview-h: 46dvh;
    --accent: #4da6ff;

    --g1: rgba(180, 20, 40, 0.35);
    --g2: rgba(120, 0, 20, 0.25);
    --g3: rgba(255, 80, 80, 0.18);
  }

  html, body{
    margin:0;
    padding:0;
    width:100vw;
    height:100dvh;
    background:#000;
    color:#fff;
    font-family:Arial, sans-serif;
    overflow:hidden;
    -webkit-tap-highlight-color: transparent;
  }

  #bg{
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background:
      radial-gradient(circle at 18% 30%, var(--g1), transparent 48%),
      radial-gradient(circle at 82% 70%, var(--g2), transparent 50%),
      radial-gradient(circle at 55% 18%, var(--g3), transparent 58%),
      #000;
    filter: blur(34px);
    animation: bgFloat 18s ease-in-out infinite alternate;
    transform: translateZ(0);
  }

  #bg::after{
    content:"";
    position:absolute;
    inset:0;
    pointer-events:none;
    background:
      radial-gradient(circle at 50% 40%, transparent 0%, rgba(0,0,0,0.55) 55%, rgba(0,0,0,0.90) 100%),
      repeating-linear-gradient(
        0deg,
        rgba(255,255,255,0.035) 0px,
        rgba(255,255,255,0.035) 1px,
        transparent 2px,
        transparent 4px
      );
    opacity: .55;
    mix-blend-mode: overlay;
  }

  @keyframes bgFloat{
    0%{ transform: scale(1) translateY(0px); }
    100%{ transform: scale(1.08) translateY(-20px); }
  }

  #wrap, #splash, #nameScreen, #rotateWarning, #launchOverlay{
    position: relative;
    z-index: 2;
  }

  @keyframes mascotFloat{
    0% { transform: translateY(0px); }
    50% { transform: translateY(-6px); }
    100% { transform: translateY(0px); }
  }

  #launchOverlay{
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.68);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    gap: 14px;
    z-index: 900;
    text-align: center;
    pointer-events: all;
  }

  #launchOverlay.show{ display:flex; }

  #launchOverlay .title{
    font-size: 24px;
    font-weight: bold;
    letter-spacing: .3px;
  }

  #launchOverlay .dice{
    font-size: 40px;
    animation: spinDice 1s linear infinite;
  }

  @keyframes spinDice{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
  }

  #rotateWarning{
    position: fixed;
    inset: 0;
    background: #000;
    color: #fff;
    display: none;
    justify-content: center;
    align-items: center;
    font-size: 22px;
    z-index: 999;
    text-align: center;
    padding: 24px;
  }

  #splash{
    position: fixed;
    inset: 0;
    background:
      radial-gradient(circle at 50% 30%, rgba(180, 20, 40, 0.28), transparent 60%),
      radial-gradient(circle at 20% 80%, rgba(255, 80, 80, 0.16), transparent 55%),
      rgba(0,0,0,0.78);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    gap:4px;
    padding:24px;
    z-index: 700;
  }

  #splash h1{
    margin:0;
    font-size:36px;
    letter-spacing:0.5px;
    text-shadow: 0 6px 30px rgba(0,0,0,0.7);
  }

  #splash .byline{
    opacity:.75;
    font-size:16px;
  }

  #splash .tap{
    margin-top:-4px;
    font-size:14px;
    opacity:.7;
    animation: pulse 1.2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: .55; transform: translateY(0); }
    50% { opacity: .9; transform: translateY(-2px); }
  }

  #splashMascot{
    width: 240px;
    max-width: 40vw;
    height: auto;
    margin-bottom: -54px;
    user-select: none;
    -webkit-user-drag: none;
    opacity: 0.98;
    filter:
      drop-shadow(0 0 30px rgba(180,20,40,0.6))
      drop-shadow(0 0 60px rgba(180,20,40,0.35));
    animation: mascotFloat 4s ease-in-out infinite;
  }

  #nameScreen{
    position: fixed;
    inset: 0;
    background:
      radial-gradient(circle at 50% 30%, rgba(180, 20, 40, 0.28), transparent 60%),
      radial-gradient(circle at 20% 80%, rgba(255, 80, 80, 0.16), transparent 55%),
      rgba(0,0,0,0.78);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    gap: 16px;
    padding: 24px;
    z-index: 700;
  }

  #nameLayout{
    display:flex;
    align-items:center;
    gap:40px;
  }

  #nameFields{
    display:flex;
    flex-direction:column;
    gap:14px;
    align-items:center;
  }

  #nameScreen h2{
    margin:0;
    font-size:26px;
    text-align:center;
  }

  #nameScreen input{
    width:260px;
    padding:14px;
    border-radius:12px;
    border:none;
    font-size:18px;
  }

  #nameScreen button{
    padding:14px 22px;
    border-radius:12px;
    background:var(--accent);
    color:white;
    font-size:18px;
    border:none;
    font-weight:bold;
    cursor:pointer;
  }

  #nameMascot{
    width:220px;
    max-width:30vw;
    height:auto;
    opacity:0.95;
    filter:
      drop-shadow(0 0 30px rgba(180,20,40,0.6))
      drop-shadow(0 0 60px rgba(180,20,40,0.35));
    animation: mascotFloat 4s ease-in-out infinite;
  }

  .tokenPicker{
    display:flex;
    gap:10px;
    margin-bottom:12px;
  }

  .token{
    width:48px;
    height:48px;
    object-fit:contain;
    border-radius:10px;
    border:2px solid transparent;
    cursor:pointer;
    background:rgba(255,255,255,0.05);
  }

  .token.selected{
    border-color:var(--accent);
    box-shadow:0 0 10px rgba(255,255,255,0.3);
  }

  #wrap{
    height:100dvh;
    display:none;
    flex-direction:column;
    justify-content:flex-start;
    align-items:center;
    gap:10px;
    padding:10px 18px 18px;
    box-sizing:border-box;
  }

  #wrap h2{
    margin:0;
    font-size:22px;
    text-align:center;
  }

  #carouselWrap{
    width: 100%;
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }

  #carouselTrack{
    display: flex;
    gap: 18px;
    overflow-x: auto;
    overflow-y: hidden;
    scroll-snap-type: x mandatory;
    scroll-behavior: smooth;
    padding: 6px 18vw;
    width: 100%;
    max-width: 100vw;
    box-sizing: border-box;
    scrollbar-width: none;
    -ms-overflow-style: none;
    align-items: center;
  }

  #carouselTrack::-webkit-scrollbar{
    display: none;
  }

  .boardSlide{
    flex: 0 0 82vw;
    max-width: 1200px;
    min-width: 520px;
    height: var(--preview-h);
    scroll-snap-align: center;
    border-radius: 22px;
    overflow: hidden;
    position: relative;
    background: rgba(18,18,18,0.42);
    border: 1px solid rgba(255,255,255,0.10);
    box-shadow:
      0 22px 70px rgba(0,0,0,0.60),
      inset 0 1px 0 rgba(255,255,255,0.06);
    transform: scale(.92);
    opacity: .62;
    transition: transform .22s ease, opacity .22s ease, box-shadow .22s ease;
    cursor: pointer;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .boardSlide.active{
    transform: scale(1);
    opacity: 1;
    box-shadow:
      0 26px 80px rgba(0,0,0,0.72),
      0 0 28px rgba(255,255,255,0.08),
      inset 0 1px 0 rgba(255,255,255,0.08);
  }

  .boardSlide img{
    display: block;
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: rgba(0,0,0,0.72);
    user-select: none;
    -webkit-user-drag: none;
  }

  #boardLabel{
    margin-top: 2px;
    font-size: 18px;
    font-weight: 700;
    opacity: .95;
    text-align: center;
    min-height: 24px;
  }

  #dots{
    display:flex;
    gap:8px;
    justify-content:center;
    margin-top:8px;
  }

  .dot{
    width:8px;
    height:8px;
    border-radius:50%;
    background:#555;
    opacity:.8;
    transition: transform .18s ease, opacity .18s ease, background .18s ease;
  }

  .dot.active{
    background: var(--accent);
    opacity: 1;
    transform: scale(1.25);
  }

  .actions{
    display:flex;
    gap:12px;
    align-items:center;
    justify-content:center;
    margin-top: 6px;
  }

  button{
    padding:14px 22px;
    font-size:18px;
    border-radius:14px;
    border:none;
    font-weight:bold;
    cursor:pointer;
    min-height:54px;
    transition: transform .08s ease, box-shadow .2s ease, filter .2s ease;
  }

  #startBtn{
    min-width: 240px;
    background: var(--accent);
    color:#fff;
    box-shadow: 0 14px 34px rgba(77,166,255,0.22);
  }

  #startBtn:active{
    transform:scale(.97);
  }

  @media (max-width: 900px){
    .boardSlide{
      flex: 0 0 88vw;
      min-width: 420px;
    }
  }

  @media (max-width: 600px){
    :root{
      --preview-h: 34dvh;
    }

    .boardSlide{
      flex: 0 0 94vw;
      min-width: 280px;
    }

    #boardLabel{
      font-size: 16px;
    }

    #startBtn{
      min-width: 210px;
    }

    #splash h1{
      font-size:32px;
    }

    #wrap h2,
    #nameScreen h2{
      font-size:24px;
    }

    #nameLayout{
      gap: 22px;
    }
  }
</style>
</head>

<body>

<div id="bg"></div>

<div id="launchOverlay">
  <div class="title">Starter spillet…</div>
  <div class="dice">🎲</div>
</div>

<div id="rotateWarning">
  🔄 Snu telefonen til liggende for å spille
</div>

<div id="splash" onclick="enterMenu()" role="button" aria-label="Trykk for å fortsette">
  <img id="splashMascot" src="mascot.png" alt="Sexopoly mascot">
  <h1>Welcome to Sexopol</h1>
  <div class="byline">Made by Espen Opsahl</div>
  <div class="tap">Trykk for å fortsette</div>
</div>

<div id="nameScreen">
  <div id="nameLayout">
    <div id="nameFields">
      <h2>Skriv inn spillernavn</h2>

      <input id="player1Name" placeholder="Spiller 1">

      <div class="tokenPicker">
        <img src="token1.png" onclick="selectToken(event, 1, 'token1.png')" class="token">
        <img src="token2.png" onclick="selectToken(event, 1, 'token2.png')" class="token">
        <img src="token3.png" onclick="selectToken(event, 1, 'token3.png')" class="token">
      </div>

      <input id="player2Name" placeholder="Spiller 2">

      <div class="tokenPicker">
        <img src="token1.png" onclick="selectToken(event, 2, 'token1.png')" class="token">
        <img src="token2.png" onclick="selectToken(event, 2, 'token2.png')" class="token">
        <img src="token3.png" onclick="selectToken(event, 2, 'token3.png')" class="token">
      </div>

      <button onclick="goToBoardSelect()">Fortsett</button>
    </div>

    <img id="nameMascot" src="mascot.png" alt="Mascot">
  </div>
</div>

<div id="wrap">
  <h2>Velg spillebrett</h2>

  <div id="carouselWrap">
    <div id="carouselTrack"></div>
  </div>

  <div id="boardLabel"></div>
  <div id="dots"></div>

  <div class="actions">
    <button id="startBtn" onclick="startGame()">Start spill</button>
  </div>
</div>

<script>
  const splashEl = document.getElementById("splash");
  const wrapEl   = document.getElementById("wrap");
  const nameScreen = document.getElementById("nameScreen");

  let p1Token = localStorage.getItem("p1token") || "token1.png";
  let p2Token = localStorage.getItem("p2token") || "token2.png";

  const boards = [
    {name:"Campfire", file:"board.png",  theme:"oransj"},
    {name:"Ocean view", file:"board2.png", theme:"morklysebla"},
    {name:"Maldives", file:"board3.png", theme:"lysebla"},
    {name:"Lake", file:"board4.png", theme:"lyselilla"},
    {name:"Candle room", file:"board5.png", theme:"rod"},
    {name:"Balcony", file:"board6.png", theme:"lysegul"},
    {name:"Fireplace", file:"board7.png", theme:"blahvit"}
  ];

  let index = 0;

  const track = document.getElementById("carouselTrack");
  const label = document.getElementById("boardLabel");
  const dotsWrap = document.getElementById("dots");

  function syncSelectedTokens(){
    const pickers = document.querySelectorAll(".tokenPicker");
    if (pickers[0]) {
      pickers[0].querySelectorAll(".token").forEach(t => {
        t.classList.toggle("selected", t.getAttribute("src") === p1Token);
      });
    }
    if (pickers[1]) {
      pickers[1].querySelectorAll(".token").forEach(t => {
        t.classList.toggle("selected", t.getAttribute("src") === p2Token);
      });
    }
  }

  function selectToken(e, player, file) {
    if (player === 1) {
      p1Token = file;
      localStorage.setItem("p1token", file);
    } else {
      p2Token = file;
      localStorage.setItem("p2token", file);
    }

    document.querySelectorAll(".tokenPicker")[player - 1]
      .querySelectorAll(".token")
      .forEach(t => t.classList.remove("selected"));

    e.target.classList.add("selected");
  }

  function openFromSavedMenuTarget(){
    const target = localStorage.getItem("menuTarget");
    if (!target) return;

    localStorage.removeItem("menuTarget");

    const isPortrait = window.matchMedia("(orientation: portrait)").matches;
    if (isPortrait) return;

    splashEl.style.display = "none";

    if (target === "players") {
      nameScreen.style.display = "flex";
      wrapEl.style.display = "none";
      document.getElementById("player1Name").value = localStorage.getItem("p1") || "";
      document.getElementById("player2Name").value = localStorage.getItem("p2") || "";
      syncSelectedTokens();
    } else if (target === "boards") {
      nameScreen.style.display = "none";
      wrapEl.style.display = "flex";
    }
  }

  function checkOrientationMenu(){
    const warning = document.getElementById("rotateWarning");
    const isPortrait = window.matchMedia("(orientation: portrait)").matches;

    warning.style.display = isPortrait ? "flex" : "none";

    if (isPortrait){
      wrapEl.style.display = "none";
      nameScreen.style.display = "none";
      splashEl.style.display = "flex";
      return;
    }

    if (splashEl.style.display !== "none"){
      wrapEl.style.display = "none";
      nameScreen.style.display = "none";
      return;
    }

    if (nameScreen.style.display !== "none"){
      wrapEl.style.display = "none";
      return;
    }

    wrapEl.style.display = "flex";
  }

  window.addEventListener("resize", checkOrientationMenu);

  function enterMenu(){
    const isPortrait = window.matchMedia("(orientation: portrait)").matches;
    if (isPortrait) return;

    splashEl.style.display = "none";
    nameScreen.style.display = "flex";
    syncSelectedTokens();

    document.getElementById("player1Name").value = localStorage.getItem("p1") || "";
    document.getElementById("player2Name").value = localStorage.getItem("p2") || "";
  }

  function goToBoardSelect(){
    localStorage.setItem("p1token", p1Token);
    localStorage.setItem("p2token", p2Token);

    const p1 = document.getElementById("player1Name").value || "Spiller 1";
    const p2 = document.getElementById("player2Name").value || "Spiller 2";

    localStorage.setItem("p1", p1);
    localStorage.setItem("p2", p2);

    nameScreen.style.display = "none";
    wrapEl.style.display = "flex";
  }

  function applyMenuTheme(theme){
    const t = (theme || "").toLowerCase();

    let g1 = "rgba(255,0,150,0.22)";
    let g2 = "rgba(77,166,255,0.22)";
    let g3 = "rgba(255,200,0,0.16)";
    let accent = "#4da6ff";

    if (t === "oransj") {
      g1 = "rgba(255,140,0,0.28)";
      g2 = "rgba(255,90,0,0.22)";
      g3 = "rgba(255,200,120,0.18)";
      accent = "#ff9a2a";
    } else if (t === "morklysebla") {
      g1 = "rgba(50,160,255,0.26)";
      g2 = "rgba(0,90,200,0.22)";
      g3 = "rgba(120,200,255,0.18)";
      accent = "#4fc3f7";
    } else if (t === "lysebla") {
      g1 = "rgba(90,215,255,0.28)";
      g2 = "rgba(77,166,255,0.20)";
      g3 = "rgba(180,230,255,0.18)";
      accent = "#5ad7ff";
    } else if (t === "lyselilla") {
      g1 = "rgba(190,120,255,0.28)";
      g2 = "rgba(140,70,255,0.22)";
      g3 = "rgba(220,180,255,0.18)";
      accent = "#d8b4ff";
    } else if (t === "rod") {
      g1 = "rgba(255,60,60,0.28)";
      g2 = "rgba(160,0,0,0.22)";
      g3 = "rgba(255,120,120,0.18)";
      accent = "#ff5a5a";
    } else if (t === "lysegul") {
      g1 = "rgba(255,220,90,0.30)";
      g2 = "rgba(255,180,0,0.22)";
      g3 = "rgba(255,240,160,0.20)";
      accent = "#ffd95a";
    } else if (t === "blahvit") {
      g1 = "rgba(200,230,255,0.30)";
      g2 = "rgba(140,190,255,0.24)";
      g3 = "rgba(240,250,255,0.22)";
      accent = "#cfe9ff";
    }

    document.documentElement.style.setProperty("--g1", g1);
    document.documentElement.style.setProperty("--g2", g2);
    document.documentElement.style.setProperty("--g3", g3);
    document.documentElement.style.setProperty("--accent", accent);
  }

  function buildCarousel(){
    track.innerHTML = "";
    dotsWrap.innerHTML = "";

    boards.forEach((board, i) => {
      const slide = document.createElement("div");
      slide.className = "boardSlide";
      slide.dataset.index = i;

      const image = document.createElement("img");
      image.src = board.file;
      image.alt = board.name;
      image.onerror = () => { image.src = "board.png"; };

      slide.appendChild(image);
      track.appendChild(slide);

      const dot = document.createElement("div");
      dot.className = "dot";
      dotsWrap.appendChild(dot);

      slide.addEventListener("click", () => {
        scrollToBoard(i);
      });
    });

    updateActiveState();
  }

  function updateActiveState(){
    const slides = [...document.querySelectorAll(".boardSlide")];
    const dots = [...document.querySelectorAll(".dot")];

    slides.forEach((slide, i) => {
      slide.classList.toggle("active", i === index);
    });

    dots.forEach((dot, i) => {
      dot.classList.toggle("active", i === index);
    });

    label.textContent = boards[index].name;
    applyMenuTheme(boards[index].theme);
  }

  function scrollToBoard(i){
    const slides = document.querySelectorAll(".boardSlide");
    if (!slides[i]) return;

    index = i;
    slides[i].scrollIntoView({
      behavior: "smooth",
      inline: "center",
      block: "nearest"
    });

    updateActiveState();
  }

  function detectCenteredBoard(){
    const slides = [...document.querySelectorAll(".boardSlide")];
    if (!slides.length) return;

    const trackRect = track.getBoundingClientRect();
    const trackCenter = trackRect.left + trackRect.width / 2;

    let closestIndex = 0;
    let closestDistance = Infinity;

    slides.forEach((slide, i) => {
      const rect = slide.getBoundingClientRect();
      const slideCenter = rect.left + rect.width / 2;
      const dist = Math.abs(trackCenter - slideCenter);

      if (dist < closestDistance) {
        closestDistance = dist;
        closestIndex = i;
      }
    });

    if (closestIndex !== index) {
      index = closestIndex;
      updateActiveState();
    }
  }

  let scrollTimer = null;
  track.addEventListener("scroll", () => {
    clearTimeout(scrollTimer);
    scrollTimer = setTimeout(detectCenteredBoard, 80);
  });

  async function startGame(){
    const overlay = document.getElementById("launchOverlay");
    overlay.classList.add("show");

    try{
      if (screen.orientation && screen.orientation.lock){
        await screen.orientation.lock("landscape");
      }
    }catch(e){}

    const chosen = boards[index].file;
    const theme = boards[index].theme;

    setTimeout(() => {
      window.location.href =
        "game.html?board=" + encodeURIComponent(chosen) +
        "&theme=" + encodeURIComponent(theme);
    }, 420);
  }

  checkOrientationMenu();
  buildCarousel();
  openFromSavedMenuTarget();
  syncSelectedTokens();

  requestAnimationFrame(() => {
    scrollToBoard(0);
  });
</script>

</body>
</html>
