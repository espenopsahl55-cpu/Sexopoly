<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Sex o Pol – Meny</title>

<style>
  :root{
    --preview-h: 140px;
    --card-w: 520px;
    --accent: #4da6ff;

    /* ✅ theme glow (oppdateres i JS) */
--g1: rgba(180, 20, 40, 0.35);   /* hoved rød glow */
--g2: rgba(120, 0, 20, 0.25);    /* dypere rød */
--g3: rgba(255, 80, 80, 0.18);   /* myk highlight */
  }

  html, body{
    margin:0; padding:0;
    width:100vw; height:100dvh;
    background:#000; color:#fff;
    font-family:Arial, sans-serif;
    overflow:hidden;
    -webkit-tap-highlight-color: transparent;
  }

  /* ✅ BACKGROUND LAG (animated + vignette + grain) */
  #bg{
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;

    background:
      radial-gradient(circle at 18% 30%, var(--g1), transparent 48%),
      radial-gradient(circle at 82% 70%, var(--g2), transparent 50%),
      radial-gradient(circle at 55% 18%, var(--g3), transparent 58%),
      #000;

    filter: blur(34px);
    animation: bgFloat 18s ease-in-out infinite alternate;
    transform: translateZ(0);
  }

  #bg::after{
    content:"";
    position:absolute;
    inset:0;
    pointer-events:none;

    background:
      radial-gradient(circle at 50% 40%, transparent 0%, rgba(0,0,0,0.55) 55%, rgba(0,0,0,0.90) 100%),
      repeating-linear-gradient(
        0deg,
        rgba(255,255,255,0.035) 0px,
        rgba(255,255,255,0.035) 1px,
        transparent 2px,
        transparent 4px
      );

    opacity: .55;
    mix-blend-mode: overlay;
  }

  @keyframes bgFloat{
    0%{ transform: scale(1) translateY(0px); }
    100%{ transform: scale(1.08) translateY(-20px); }
  }

  /* sørg for at UI ligger over bakgrunn */
  #wrap, #splash, #rotateWarning, #launchOverlay{
    position: relative;
    z-index: 2;
  }
@keyframes mascotFloat{
  0% { transform: translateY(0px); }
  50% { transform: translateY(-6px); }
  100% { transform: translateY(0px); }
}
  /* START-OVERLAY */
  #launchOverlay{
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.68);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    gap: 14px;
    z-index: 900;
    text-align: center;
    pointer-events: all;
  }
  #launchOverlay.show{ display:flex; }
  #launchOverlay .title{ font-size: 24px; font-weight: bold; letter-spacing: .3px; }
  #launchOverlay .dice{ font-size: 40px; animation: spinDice 1s linear infinite; }
  @keyframes spinDice{ from{transform:rotate(0deg);} to{transform:rotate(360deg);} }

  /* ROTER-OVERLAY */
  #rotateWarning{
    position: fixed;
    inset: 0;
    background: #000;
    color: #fff;
    display: none;
    justify-content: center;
    align-items: center;
    font-size: 22px;
    z-index: 999;
    text-align: center;
    padding: 24px;
  }

  /* SPLASH */
/* SPLASH */
#splash{
  position: fixed;
  inset: 0;

  /* ✅ rød tone/fade (ikke “malt rød”) */
  background:
    radial-gradient(circle at 50% 30%, rgba(180, 20, 40, 0.28), transparent 60%),
    radial-gradient(circle at 20% 80%, rgba(255, 80, 80, 0.16), transparent 55%),
    rgba(0,0,0,0.78);

  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);

  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  gap:0px;
  padding:24px;
  z-index: 700;
}

  #splash h1{ margin:0; font-size:36px; letter-spacing:0.5px; }
  #splash h1{
  text-shadow: 0 6px 30px rgba(0,0,0,0.7);
}
  #splash .byline{ opacity:.75; font-size:16px; }
  #splash .tap{ margin-top:-4px; font-size:14px; opacity:.7; }

  @keyframes pulse {
    0%, 100% { opacity: .55; transform: translateY(0); }
    50% { opacity: .9; transform: translateY(-2px); }
  }
  #splash .tap{ animation: pulse 1.2s infinite; }

#splashMascot{
  width: 240px;
  max-width: 40vw;
  height: auto;
  margin-bottom: -54px;
  user-select: none;
  -webkit-user-drag: none;
  opacity: 0.98;
  filter: 
  drop-shadow(0 0 30px rgba(180,20,40,0.6))
  drop-shadow(0 0 60px rgba(180,20,40,0.35));
  animation: mascotFloat 4s ease-in-out infinite;
}

  /* MENY */
  #wrap{
    height:100dvh;
    display:none; /* ✅ viktig: meny skjules til du trykker “fortsett” */
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:12px;
    padding:18px;
    box-sizing:border-box;
  }

  h2{ margin:0; font-size:26px; text-align:center; }

  #previewCard{
    width: min(80vw, var(--card-w));
    border-radius:18px;
    padding:14px 14px 12px;
    box-sizing:border-box;

    background: rgba(18,18,18,0.55);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);

    border: 1px solid rgba(255,255,255,0.12);
    box-shadow: 0 22px 70px rgba(0,0,0,0.60);

    position: relative;
    overflow: hidden;
  }

  #previewCard::before{
    content:"";
    position:absolute;
    inset:-2px;
    background: radial-gradient(circle at 30% 10%, rgba(255,255,255,0.10), transparent 45%);
    pointer-events:none;
    opacity:.6;
  }
#previewCard::before{
  display: none;
}
  #previewFrame{
    width:100%;
    height: var(--preview-h);
    border-radius:14px;
    overflow:hidden;
background: #000;
    border: 1px solid rgba(255,255,255,0.10);
    display:flex;
    align-items:center;
    justify-content:center;
  }

  #previewImg{
    width:100%;
    height:100%;
    object-fit: contain;
    display:block;
    user-select:none;
    -webkit-user-drag:none;
    touch-action: pan-y;

    opacity: 1;
transform: translateX(24px);
    transition: opacity .18s ease, transform .18s ease;
  }

  #previewImg.swapOut{
    opacity: 0;
    transform: translateY(4px);
  }

  #boardLabel{ margin-top:10px; font-size:16px; opacity:.92; text-align:center; }
  #hint{ font-size:12px; opacity:.65; text-align:center; }

  #dots{
    display:flex;
    gap:8px;
    justify-content:center;
    margin-top:10px;
  }
  .dot{
    width:8px; height:8px;
    border-radius:50%;
    background:#555;
    opacity: .8;
    transition: transform .18s ease, opacity .18s ease, background .18s ease;
  }
  .dot.active{
    background: var(--accent);
    opacity: 1;
    transform: scale(1.25);
  }

  .actions{ display:flex; gap:12px; align-items:center; justify-content:center; }

  button{
    padding:14px 22px;
    font-size:18px;
    border-radius:14px;
    border:none;
    font-weight:bold;
    cursor:pointer;
    min-height:54px;
    transition: transform .08s ease, box-shadow .2s ease, filter .2s ease;
  }

  #startBtn{
    background: var(--accent);
    color:#fff;
    box-shadow: 0 14px 34px rgba(77,166,255,0.22);
  }
  #startBtn:active{ transform:scale(.97); }

  .navBtn{
    background: rgba(34,34,34,0.85);
    color:#fff;
    padding:14px 16px;
    min-width:54px;
    border: 1px solid rgba(255,255,255,0.10);
  }
  .navBtn:active{ transform:scale(.97); }

  @media (max-width: 420px){
    :root{ --preview-h: 120px; }
    #splash h1{ font-size:32px; }
    h2{ font-size:24px; }
  }
</style>
</head>

<body>

<div id="bg"></div>

<!-- STARTING OVERLAY -->
<div id="launchOverlay">
  <div class="title">Starter spillet…</div>
  <div class="dice">🎲</div>
</div>

<div id="rotateWarning">
  🔄 Snu telefonen til liggende for å spille
</div>

<!-- FORSIDE -->
<div id="splash" onclick="enterMenu()" role="button" aria-label="Trykk for å fortsette">
  <img id="splashMascot" src="mascot.png" alt="Sexopoly mascot">
  <h1>Welcome to Sexopol</h1>
  <div class="byline">Made by Espen Opsahl</div>
  <div class="tap">Trykk for å fortsette</div>
</div>

<!-- BRETTVELGER -->
<div id="wrap">
  <h2>Velg spillebrett</h2>

  <div id="previewCard">
    <div id="previewFrame">
      <img id="previewImg" src="board.png" alt="Preview">
    </div>

    <div id="boardLabel"></div>
    <div id="hint">Sveip på bildet for å bytte brett</div>
    <div id="dots"></div>
  </div>

  <div class="actions">
    <button class="navBtn" onclick="prevBoard()">◀</button>
    <button id="startBtn" onclick="startGame()">Start spill</button>
    <button class="navBtn" onclick="nextBoard()">▶</button>
  </div>
</div>

<script>
  const splashEl = document.getElementById("splash");
  const wrapEl   = document.getElementById("wrap");

  function checkOrientationMenu(){
    const warning = document.getElementById("rotateWarning");
    const isPortrait = window.matchMedia("(orientation: portrait)").matches;

    warning.style.display = isPortrait ? "flex" : "none";

    // ✅ Portrait: vis bare rotate + splash (ikke meny)
    if (isPortrait){
      wrapEl.style.display = "none";
      splashEl.style.display = "flex";
      return;
    }

    // ✅ Landscape: hvis splash er borte → vis meny
    if (splashEl.style.display === "none"){
      wrapEl.style.display = "flex";
    }
  }

  window.addEventListener("resize", checkOrientationMenu);
  checkOrientationMenu();

  function enterMenu(){
    const isPortrait = window.matchMedia("(orientation: portrait)").matches;
    if (isPortrait) return;

    splashEl.style.display = "none";
    wrapEl.style.display = "flex";
  }

  const boards = [
    {name:"Original", file:"board.png",  theme:"gul"},
    {name:"Grønn/Lilla/Blå", file:"board2.png", theme:"lysegronn"},
    {name:"Lilla/Grønn/Gul", file:"board3.png", theme:"lilla"},
    {name:"Lilla/Gul", file:"board4.png", theme:"gul"},
    {name:"Blå/Gul", file:"board5.png", theme:"gul"},
    {name:"Lyseblå/Gul", file:"board6.png", theme:"lysebla"},
    {name:"Grønn/Gul", file:"board7.png", theme:"gronn"}
  ];

  let index = 0;

  const img = document.getElementById("previewImg");
  const label = document.getElementById("boardLabel");
  const dotsWrap = document.getElementById("dots");

  boards.forEach(() => {
    const d = document.createElement("div");
    d.className = "dot";
    dotsWrap.appendChild(d);
  });

  function applyMenuTheme(theme){
    const t = (theme || "").toLowerCase();

    let g1 = "rgba(255,0,150,0.22)";
    let g2 = "rgba(77,166,255,0.22)";
    let g3 = "rgba(255,200,0,0.16)";
    let accent = "#4da6ff";

    if (t === "lilla") {
      g1 = "rgba(180,60,255,0.26)";
      g2 = "rgba(77,166,255,0.18)";
      g3 = "rgba(255,200,0,0.10)";
      accent = "#b36bff";
    } else if (t === "gronn") {
      g1 = "rgba(0,200,120,0.22)";
      g2 = "rgba(77,166,255,0.14)";
      g3 = "rgba(255,200,0,0.12)";
      accent = "#39d98a";
    } else if (t === "lysegronn") {
      g1 = "rgba(120,255,120,0.22)";
      g2 = "rgba(77,166,255,0.14)";
      g3 = "rgba(255,0,150,0.10)";
      accent = "#7dff7d";
    } else if (t === "lysebla") {
      g1 = "rgba(90,215,255,0.24)";
      g2 = "rgba(77,166,255,0.18)";
      g3 = "rgba(255,0,150,0.10)";
      accent = "#5ad7ff";
    } else if (t === "gul") {
      g1 = "rgba(255,200,0,0.22)";
      g2 = "rgba(255,0,150,0.14)";
      g3 = "rgba(77,166,255,0.14)";
      accent = "#ffd54a";
    }

    document.documentElement.style.setProperty("--g1", g1);
    document.documentElement.style.setProperty("--g2", g2);
    document.documentElement.style.setProperty("--g3", g3);
    document.documentElement.style.setProperty("--accent", accent);
  }

  function updateUI(withAnim = true){
    const b = boards[index];

    applyMenuTheme(b.theme);

    label.textContent = b.name;
    document.querySelectorAll(".dot").forEach((d,i)=>{
      d.classList.toggle("active", i === index);
    });

    if (!withAnim) {
      img.src = b.file;
      return;
    }

    img.classList.add("swapOut");
    setTimeout(() => { img.src = b.file; }, 120);

    img.onload = () => {
      requestAnimationFrame(() => img.classList.remove("swapOut"));
    };
  }

  function nextBoard(){
    index = (index + 1) % boards.length;
    updateUI(true);
  }

  function prevBoard(){
    index = (index - 1 + boards.length) % boards.length;
    updateUI(true);
  }

  let startX = 0;
  img.addEventListener("touchstart", e=>{
    startX = e.changedTouches[0].screenX;
  }, {passive:true});

  img.addEventListener("touchend", e=>{
    const diff = e.changedTouches[0].screenX - startX;
    if (diff < -50) nextBoard();
    else if (diff > 50) prevBoard();
  }, {passive:true});

  async function startGame(){
    const overlay = document.getElementById("launchOverlay");
    overlay.classList.add("show");

    try{
      if (screen.orientation && screen.orientation.lock){
        await screen.orientation.lock("landscape");
      }
    }catch(e){}

    const chosen = boards[index].file;
    const theme = boards[index].theme;

    setTimeout(()=>{
      window.location.href =
        "game.html?board=" + encodeURIComponent(chosen) +
        "&theme=" + encodeURIComponent(theme);
    }, 420);
  }

  img.onerror = () => { img.src = "board.png"; };

  updateUI(false);
</script>

</body>
</html>
