<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Sex o Pol – Meny</title>

<style>
  :root{
    --preview-h: 140px;
    --card-w: 520px;
    --accent: #4da6ff;
  }

  html, body{
    margin:0; padding:0;
    width:100vw; height:100dvh;
    background:#000; color:#fff;
    font-family:Arial, sans-serif;
    overflow:hidden;
    -webkit-tap-highlight-color: transparent;
  }

  /* START-OVERLAY */
  #launchOverlay{
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(6px);
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    gap: 14px;
    z-index: 900;
    text-align: center;

    /* ✅ smooth pop-in */
    opacity: 0;
    transform: scale(1.02);
    transition: opacity .25s ease, transform .25s ease;
  }
  #launchOverlay.show{
    display:flex;
    opacity: 1;
    transform: scale(1);
  }
  #launchOverlay .title{ font-size: 24px; font-weight: bold; }
  #launchOverlay .dice{ font-size: 40px; animation: spinDice 1s linear infinite; }
  @keyframes spinDice{ from{transform:rotate(0deg);} to{transform:rotate(360deg);} }

  /* ROTER-OVERLAY */
  #rotateWarning{
    position: fixed;
    inset: 0;
    background: #000;
    color: #fff;
    display: none;
    justify-content: center;
    align-items: center;
    font-size: 22px;
    z-index: 999;
    text-align: center;
    padding: 24px;
  }

  /* SPLASH */
  #splash{
    position: fixed;
    inset: 0;
    background: #000;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    gap:14px;
    padding:24px;
    z-index: 500;
  }

  #splash h1{ margin:0; font-size:36px; letter-spacing:0.5px; }
  #splash .byline{ opacity:.75; font-size:16px; }

  /* ✅ Hevet KUN denne teksten litt opp */
  #splash .tap{
    margin-top: 6px; /* var 14px før */
    font-size:14px;
    opacity:.7;
    animation: pulse 1.2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: .55; transform: translateY(0); }
    50% { opacity: .9; transform: translateY(-2px); }
  }

  #splashMascot{
    width: min(32vw, 170px);
    height: auto;
    margin-bottom: 8px;
    user-select: none;
    -webkit-user-drag: none;
    opacity: 0.95;

    /* ✨ glow rundt */
    filter: drop-shadow(0 0 12px rgba(77,166,255,0.35));

    /* ✨ glow litt inn på bildet */
    box-shadow: inset 0 0 18px rgba(77,166,255,0.12);

    border-radius: 12px; /* viktig for pen glow */
  }

  /* 🎨 LIVE BACKGROUND */
  body::before{
    content:"";
    position:fixed;
    inset:0;
    z-index:-1;

    background:
      radial-gradient(circle at 20% 30%, rgba(255,0,150,0.18), transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(77,166,255,0.18), transparent 40%),
      radial-gradient(circle at 60% 20%, rgba(255,200,0,0.12), transparent 45%),
      #000;

    filter: blur(40px);
    animation: bgFloat 18s ease-in-out infinite alternate;
  }

  @keyframes bgFloat{
    0%{ transform: scale(1) translateY(0px); }
    100%{ transform: scale(1.08) translateY(-20px); }
  }

  /* 🌑 VIGNETTE + FILM GRAIN */
  body::after{
    content:"";
    position:fixed;
    inset:0;
    z-index:-1;
    pointer-events:none;

    background:
      radial-gradient(circle at 50% 40%, transparent 0%, rgba(0,0,0,0.55) 55%, rgba(0,0,0,0.85) 100%);

    opacity: .55;
    mix-blend-mode: overlay;
    filter: contrast(1.1);
  }

  /* MENY */
  #wrap{
    height:100dvh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:12px;
    padding:18px;
    box-sizing:border-box;
  }
  h2{ margin:0; font-size:26px; text-align:center; }

  #previewCard{
    width: min(80vw, var(--card-w));
    border-radius:16px;
    padding:12px;
    box-sizing:border-box;

    background: rgba(18,18,18,0.55);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.10);
    box-shadow: 0 18px 55px rgba(0,0,0,0.55);

    /* ✅ for highlight overlay */
    position: relative;
    overflow: hidden;
  }

  /* ✅ “glass highlight” på kortet */
  #previewCard::before{
    content:"";
    position:absolute;
    inset:-2px;
    pointer-events:none;
    background:
      radial-gradient(circle at 25% 10%,
        rgba(255,255,255,0.10),
        transparent 55%);
    opacity:.9;
    mix-blend-mode: screen;
  }

  #previewFrame{
    width:100%;
    height: var(--preview-h);
    border-radius:12px;
    overflow:hidden;
    background:#000;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  #previewImg{
    width:100%;
    height:100%;
    object-fit: contain;
    display:block;
    user-select:none;
    -webkit-user-drag:none;
    touch-action: pan-y;

    /* ✅ smooth fade når brett byttes */
    opacity: 1;
    transition: opacity .18s ease;
    will-change: opacity;
  }
  #previewImg.is-fading{ opacity: 0; }

  #boardLabel{ margin-top:10px; font-size:15px; opacity:.85; text-align:center; }
  #hint{ font-size:12px; opacity:.6; text-align:center; }

  #dots{
    display:flex;
    gap:8px;
    justify-content:center;
    margin-top:10px;
  }
  .dot{
    width:8px; height:8px; border-radius:50%;
    background:#555;
    opacity:.65;
    transition: transform .18s ease, opacity .18s ease, box-shadow .18s ease, background .18s ease;
  }
  .dot.active{
    background: var(--accent);
    opacity: 1;
    transform: scale(1.15);
    box-shadow: 0 0 10px color-mix(in srgb, var(--accent) 70%, transparent);
  }

  .actions{ display:flex; gap:12px; align-items:center; justify-content:center; }

  button{
    padding:14px 22px;
    font-size:18px;
    border-radius:12px;
    border:none;
    font-weight:bold;
    cursor:pointer;
    min-height:54px;
  }

  /* ✅ premium start button */
  #startBtn{
    color:#fff;
    background: linear-gradient(180deg,
      color-mix(in srgb, var(--accent) 92%, white 8%),
      color-mix(in srgb, var(--accent) 92%, black 8%)
    );
    box-shadow:
      0 14px 34px rgba(0,0,0,0.55),
      0 0 18px color-mix(in srgb, var(--accent) 55%, transparent);
    transition: transform .08s ease, box-shadow .2s ease, filter .2s ease;
  }
  #startBtn:active{ transform:scale(.97); }

  .navBtn{
    background:#222;
    color:#fff;
    padding:14px 16px;
    min-width:54px;
    transition: transform .08s ease, filter .2s ease;
  }
  .navBtn:active{ transform:scale(.97); }

  @media (max-width: 420px){
    :root{ --preview-h: 120px; }
    #splash h1{ font-size:32px; }
    h2{ font-size:24px; }
  }

  /* ✅ Respect reduced motion */
  @media (prefers-reduced-motion: reduce){
    *{ animation: none !important; transition: none !important; }
  }
</style>
</head>

<body>

<!-- STARTING OVERLAY (MÅ LIGGE INNI BODY) -->
<div id="launchOverlay">
  <div class="title">Starter spillet…</div>
  <div class="dice">🎲</div>
</div>

<div id="rotateWarning">
  🔄 Snu telefonen til liggende for å spille
</div>

<!-- FORSIDE -->
<div id="splash" onclick="enterMenu()" role="button" aria-label="Trykk for å fortsette">
  <img id="splashMascot" src="mascot.png" alt="Sexopoly mascot">
  <h1>Welcome to Sexopol</h1>
  <div class="byline">Made by Espen Opsahl</div>
  <div class="tap">Trykk for å fortsette</div>
</div>

<!-- BRETTVELGER -->
<div id="wrap">
  <h2>Velg spillebrett</h2>

  <div id="previewCard">
    <div id="previewFrame">
      <img id="previewImg" src="board.png" alt="Preview">
    </div>

    <div id="boardLabel"></div>
    <div id="hint">Sveip på bildet for å bytte brett</div>
    <div id="dots"></div>
  </div>

  <div class="actions">
    <button class="navBtn" onclick="prevBoard()">◀</button>
    <button id="startBtn" onclick="startGame()">Start spill</button>
    <button class="navBtn" onclick="nextBoard()">▶</button>
  </div>
</div>

<script>
  function checkOrientationMenu(){
    const warning = document.getElementById("rotateWarning");
    const isPortrait = window.matchMedia("(orientation: portrait)").matches;
    warning.style.display = isPortrait ? "flex" : "none";
  }
  window.addEventListener("resize", checkOrientationMenu);
  checkOrientationMenu();

  function enterMenu(){
    const isPortrait = window.matchMedia("(orientation: portrait)").matches;
    if (isPortrait) return;
    document.getElementById("splash").style.display = "none";
  }

  const boards = [
    {name:"Original", file:"board.png",  theme:"gul",      accent:"#ffcc3a"},
    {name:"Grønn/Lilla/Blå", file:"board2.png", theme:"lysegronn", accent:"#66ff8a"},
    {name:"Lilla/Grønn/Gul", file:"board3.png", theme:"lilla",    accent:"#b066ff"},
    {name:"Lilla/Gul", file:"board4.png", theme:"gul",            accent:"#ffcc3a"},
    {name:"Blå/Gul", file:"board5.png", theme:"gul",              accent:"#ffcc3a"},
    {name:"Lyseblå/Gul", file:"board6.png", theme:"lysebla",      accent:"#5ad7ff"},
    {name:"Grønn/Gul", file:"board7.png", theme:"gronn",          accent:"#39d98a"}
  ];

  let index = 0;

  const img = document.getElementById("previewImg");
  const label = document.getElementById("boardLabel");
  const dotsWrap = document.getElementById("dots");

  boards.forEach(() => {
    const d = document.createElement("div");
    d.className = "dot";
    dotsWrap.appendChild(d);
  });

  function setAccent(color){
    if (!color) return;
    document.documentElement.style.setProperty("--accent", color);
  }

  function updateUI(){
    // ✅ Accent følger brettet
    setAccent(boards[index].accent);

    // ✅ Fade-out → bytt bilde → fade-in
    img.classList.add("is-fading");
    setTimeout(() => {
      img.src = boards[index].file;
      label.textContent = boards[index].name;

      document.querySelectorAll(".dot").forEach((d,i)=>{
        d.classList.toggle("active", i === index);
      });

      requestAnimationFrame(() => {
        img.classList.remove("is-fading");
      });
    }, 140);
  }

  function nextBoard(){
    index = (index + 1) % boards.length;
    updateUI();
  }
  function prevBoard(){
    index = (index - 1 + boards.length) % boards.length;
    updateUI();
  }

  let startX = 0;
  img.addEventListener("touchstart", e=>{
    startX = e.changedTouches[0].screenX;
  }, {passive:true});

  img.addEventListener("touchend", e=>{
    const diff = e.changedTouches[0].screenX - startX;
    if (diff < -50) nextBoard();
    else if (diff > 50) prevBoard();
  }, {passive:true});

  async function startGame(){
    const overlay = document.getElementById("launchOverlay");
    overlay.classList.add("show");

    try{
      if (screen.orientation && screen.orientation.lock){
        await screen.orientation.lock("landscape");
      }
    }catch(e){}

    const chosen = boards[index].file;
    const theme = boards[index].theme;

    setTimeout(()=>{
      window.location.href =
        "game.html?board=" + encodeURIComponent(chosen) +
        "&theme=" + encodeURIComponent(theme);
    }, 420);
  }

  img.onerror = () => { img.src = "board.png"; };

  updateUI();
</script>

</body>
</html>
